<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles Leclerc</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Outfit',sans-serif;
background:#f8f8f8;
color:#111;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:25px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.75);
backdrop-filter:blur(15px);
z-index:999;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:2px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:72px;
}

.hero p{
margin-top:20px;
font-size:22px;
max-width:700px;
color:#555;
line-height:1.7;
}

.scroll{
margin-top:60px;
font-size:14px;
letter-spacing:4px;
animation:float 2s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(10px);}
}

</style>
</head>

<body>

<nav>
<div class="logo">CL16</div>
</nav>

<section class="hero">
<h1>Charles Leclerc</h1>
<p>
The journey of one of Formula One's fastest and most talented drivers,
from karting prodigy in Monaco to Ferrari star.
</p>

<div class="scroll">
SCROLL ↓
</div>

</section>

</body>
</html>
