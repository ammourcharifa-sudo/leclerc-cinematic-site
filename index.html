<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles Leclerc</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
overflow-x:hidden;
color:white;
background:black;
}

/* HERO IMAGE BACKGROUND */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

/* 👇 THIS IS YOUR NEW CINEMATIC IMAGE */
background:url('file_00000000402071f492ecf7644ab40e82') center/cover no-repeat;

filter:brightness(0.55);
z-index:-1;
transform:scale(1.05);
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-weight:700;
letter-spacing:2px;
}

/* HERO TEXT */
.hero h1{
font-size:90px;
text-shadow:0 10px 30px rgba(0,0,0,0.8);
animation:fadeIn 1.5s ease;
}

.hero p{
max-width:700px;
margin-top:20px;
font-size:20px;
color:#ddd;
animation:fadeIn 2s ease;
}

.btn{
margin-top:30px;
padding:12px 25px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
transition:0.3s;
animation:fadeIn 2.5s ease;
}

.btn:hover{
background:white;
color:black;
}

/* SECTIONS */
section{
padding:120px 60px;
background:#0a0a0a;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
margin-top:15px;
}

h2{
font-size:40px;
margin-bottom:20px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<nav>
<div class="logo">CL16</div>
<div>Ferrari • Monaco • F1</div>
</nav>

<div class="hero">
<h1>Charles Leclerc</h1>
<p>From Monaco karting prodigy to Ferrari Formula 1 driver.</p>

<button class="btn" onclick="document.getElementById('career').scrollIntoView({behavior:'smooth'})">
Explore Career
</button>
</div>

<section id="career">
<h2>Career</h2>

<div class="card">
Scuderia Ferrari Formula 1 driver known for speed, precision, and qualifying performance.
</div>

<div class="card">
Multiple Grand Prix winner and Monaco-born racing talent.
</div>
</section>

</body>
</html>
